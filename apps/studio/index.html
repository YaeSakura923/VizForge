<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="VizForge Studio — VTK.js Scientific Visualization Pipeline Engine. Interactive 3D rendering with React, WebGL, and GSAP animations." />
    <meta name="theme-color" content="#0b0b14" />
    <meta name="author" content="Wang Haobo" />
    <title>VizForge Studio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%234fc3f7'/><stop offset='100%25' stop-color='%237c4dff'/></linearGradient></defs><path d='M16 2L4 10v12l12 8 12-8V10L16 2z' fill='url(%23g)' opacity='0.9'/><path d='M16 2v28M4 14l12-4 12 4' stroke='%23fff' stroke-width='0.5' opacity='0.3'/></svg>" />
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #0b0b14;
        color: #e8e8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      *, *::before, *::after { box-sizing: border-box; }

      /* Splash screen */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0b0b14;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash-logo {
        width: 48px;
        height: 48px;
        margin-bottom: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-title {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #4fc3f7, #7c4dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      #splash-sub {
        font-size: 12px;
        color: #6a6a8e;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      #splash-spinner {
        margin-top: 32px;
        width: 24px;
        height: 24px;
        border: 2px solid rgba(79, 195, 247, 0.1);
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg id="splash-logo" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4fc3f7"/>
            <stop offset="100%" stop-color="#7c4dff"/>
          </linearGradient>
        </defs>
        <path d="M16 4L4 11v10l12 7 12-7V11L16 4z" stroke="url(#sg)"/>
        <path d="M16 4v24" stroke="url(#sg)" opacity="0.4"/>
        <path d="M4 15l12-5 12 5" stroke="url(#sg)" opacity="0.5"/>
        <circle cx="16" cy="16" r="3" fill="url(#sg)" opacity="0.4"/>
      </svg>
      <div id="splash-title">VizForge</div>
      <div id="splash-sub">Visualization Pipeline Engine</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
